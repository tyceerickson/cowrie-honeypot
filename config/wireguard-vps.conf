# WireGuard Configuration — VPS Client Side
# File: /etc/wireguard/wg0.conf on DigitalOcean VPS (174.138.35.11)
# 
# SECURITY NOTE: Private key is REDACTED in this template.
# The actual private key lives only on the VPS at /etc/wireguard/vps_private.key
# Never commit the actual private key to version control.
#
# To deploy:
# 1. Generate keypair on VPS: wg genkey | tee /etc/wireguard/vps_private.key | wg pubkey > /etc/wireguard/vps_public.key
# 2. Replace <REDACTED> below with: $(cat /etc/wireguard/vps_private.key)
# 3. Replace <OPNSENSE_PUBLIC_KEY> with the key from OPNsense VPN -> WireGuard -> Instances
# 4. chmod 600 /etc/wireguard/wg0.conf
# 5. systemctl enable wg-quick@wg0 && systemctl start wg-quick@wg0

[Interface]
# VPS WireGuard private key (REDACTED — see /etc/wireguard/vps_private.key on VPS)
PrivateKey = <REDACTED>

# VPS tunnel IP address — the /30 subnet gives us .1 (OPNsense) and .2 (VPS)
Address = 10.10.10.2/30

# WireGuard listen port — must be open in DigitalOcean Cloud Firewall (UDP 51820)
ListenPort = 51820

[Peer]
# OPNsense WireGuard instance (wg-honeypot)
# This is the OPNsense public key — safe to document, cannot be used to decrypt traffic
PublicKey = OWvU3nYRQLsWUljyl4t25rmw0ZvYqzgTtjAqU6RV1C4=

# Traffic routing through the tunnel:
# 10.10.10.1/32 — OPNsense tunnel IP (keepalives, control traffic)
# 192.168.10.0/24 — VLAN 10 subnet (log forwarding to Ubuntu Server 192.168.10.4)
AllowedIPs = 10.10.10.1/32, 192.168.10.0/24

# Keepalive ensures the tunnel stays alive through NAT
# OPNsense is behind Eero double-NAT — keepalives are essential
PersistentKeepalive = 25

# ============================================================
# OPNsense Peer Configuration (for reference)
# Configure in: VPN -> WireGuard -> Peers -> +
# ============================================================
# Name: ubuntu-home-server-droplet
# Public Key: <VPS PUBLIC KEY from /etc/wireguard/vps_public.key>
# Allowed IPs: 10.10.10.2/32
# Endpoint host: 174.138.35.11
# Endpoint port: 51820
# Instances: wg-honeypot
# Keepalive interval: 25
