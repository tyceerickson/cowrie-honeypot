# nginx Honeypot Configuration
# 
# DESIGN DECISION: This is intentionally the default nginx config.
# A custom restrictive config would reduce probe variety and produce less interesting data.
# The default config accepts all requests, returns appropriate HTTP responses, and
# logs everything — exactly what a honeypot needs.
#
# The nginx container uses this implicitly — no custom config file is mounted.
# This file documents the effective configuration for reference and reproducibility.
#
# To verify the running config: docker exec nginx-honeypot nginx -T

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Combined log format — captures all fields needed for attack analysis:
    # Remote IP, timestamp, method, path, status, size, referrer, user-agent
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # Serve default nginx page for all requests
        # 404 responses for missing paths are logged — this is intentional
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        # Return 404 for error pages (logged)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

# ============================================================
# HIGH-VALUE LOG PATTERNS TO MONITOR
# These paths indicate specific attack categories:
#
# /.env                    → Environment file exposure (T1552.001)
# /.git/config             → Git repository exposure (T1552)
# /wp-login.php            → WordPress brute force (T1110)
# /cgi-bin/                → CGI exploit attempts (T1190)
# /admin, /manager         → Admin panel brute force (T1110)
# /actuator                → Spring Boot exposure (T1190)
# ${jndi: in headers       → Log4Shell CVE-2021-44228 (T1190)
# /../../../etc/passwd      → Path traversal (T1083)
# /phpmyadmin              → Database admin exposure
# /.well-known/            → ACME/cert scanning
# ============================================================
